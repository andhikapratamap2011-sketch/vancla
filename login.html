<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VANCLA OWNER - Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#02060f;--bg2:#060d1a;--bg3:#0a1220;--glass:rgba(255,255,255,.04);--gb:rgba(255,255,255,.08);--acc:#f59e0b;--acc2:#d97706;--glow:rgba(245,158,11,.2);--green:#10b981;--red:#ef4444;--blue:#0ea5e9;--text:#e2e8f0;--t2:#64748b}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(245,158,11,.05),transparent 60%);pointer-events:none}

#pg-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.lbox{width:100%;max-width:340px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid rgba(245,158,11,.2);border-radius:20px;padding:36px 28px;text-align:center;box-shadow:0 0 60px rgba(245,158,11,.08)}
.lic{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:28px;color:#02060f;box-shadow:0 0 28px var(--glow)}
.ltitle{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:var(--acc);letter-spacing:3px;margin-bottom:4px}
.lsub{font-size:10px;color:var(--t2);letter-spacing:2px;margin-bottom:28px;font-family:'JetBrains Mono',monospace}
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:all .2s;margin-bottom:12px}
.inp:focus{border-color:rgba(245,158,11,.5);box-shadow:0 0 0 3px rgba(245,158,11,.07)}
.inp::placeholder{color:var(--t2)}
.btn-gold{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#02060f;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px var(--glow);transition:all .2s}
.btn-gold:active{transform:scale(.97)}
.lerr{font-size:12px;color:var(--red);margin-top:8px;text-align:center;display:none}
#toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--gb);border-radius:10px;padding:11px 16px;font-size:12px;color:var(--text);z-index:999;opacity:0;transition:all .3s;transform:translateY(8px);pointer-events:none;font-family:'JetBrains Mono',monospace;max-width:300px}
#toast.show{opacity:1;transform:none}
#toast.ok{border-color:rgba(16,185,129,.4);color:var(--green)}
#toast.err{border-color:rgba(239,68,68,.4);color:var(--red)}
</style>
</head>
<body>
<div id="toast"></div>

<div id="pg-login">
  <div class="lbox">
    <div class="lic"><i class="fa-solid fa-crown"></i></div>
    <div class="ltitle">VANCLA</div>
    <div class="lsub">OWNER PANEL</div>
    <input class="inp" type="text" id="lu" placeholder="Username" autocomplete="off">
    <input class="inp" type="password" id="lp" placeholder="Password" autocomplete="off">
    <button class="btn-gold" onclick="doLogin()"><i class="fa-solid fa-right-to-bracket"></i> LOGIN</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<script>
let toastT;

function g(id){return document.getElementById(id);}
function toast(msg,type=''){const t=g('toast');t.textContent=msg;t.className='show'+(type?' '+type:'');clearTimeout(toastT);toastT=setTimeout(()=>{t.className='';},3000);}

async function doLogin() {
  const u = g('lu').value.trim();
  const p = g('lp').value.trim();
  const e = g('lerr');
  e.style.display = 'none';
  e.textContent = '';
  
  if (!u || !p) { 
    e.textContent = 'Isi semua field'; 
    e.style.display = 'block'; 
    return; 
  }

  // Cek kredensial langsung
  if (u === 'VANCLA2026' && p === 'VANCLARAT2K26') {
    try { 
      sessionStorage.setItem('vtok', '1');
      toast('Login berhasil, mengalihkan...', 'ok');
      setTimeout(() => {
        window.location.href = '/dashboard.html';
      }, 500);
    } catch(ex) { 
      toast('Gagal menyimpan session','err'); 
    }
  } else {
    e.textContent = 'Username atau password salah';
    e.style.display = 'block';
    g('lp').value = '';
    g('lp').focus();
    
    // Shake animation
    const box = document.querySelector('.lbox');
    box.style.animation = 'none';
    box.offsetHeight; // trigger reflow
    box.style.animation = 'shake 0.3s ease-in-out';
    setTimeout(() => {
      box.style.animation = '';
    }, 300);
  }
}

// Add shake animation
const style = document.createElement('style');
style.textContent = `
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
`;
document.head.appendChild(style);

document.addEventListener('keydown', e => {
  if(e.key === 'Enter') doLogin();
});

// Cek jika sudah login, langsung redirect ke dashboard
if (sessionStorage.getItem('vtok') === '1') {
  window.location.href = '/dashboard.html';
}
</script>
</body>
</html>
